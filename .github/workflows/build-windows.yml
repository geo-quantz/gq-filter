name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniforge (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: '3.12'
          auto-activate-base: false
          activate-environment: build
          channels: conda-forge

      - name: Install PDAL and PyInstaller
        shell: bash -l {0}
        run: |
          conda install -y -c conda-forge python=3.12 pdal python-pdal pyinstaller

      - name: Build with PyInstaller
        shell: bash -l {0}
        run: |
          pyinstaller --clean packaging/gqfilter.spec

      - name: Sanity check
        shell: bash -l {0}
        run: |
          ./dist/gqfilter/gqfilter.exe --help

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/gqfilter/* -DestinationPath dist/gqfilter_windows.zip

      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
          }
          $wixInstall = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v*" -ErrorAction SilentlyContinue |
                        Select-Object -First 1
          if ($wixInstall) {
            "$($wixInstall.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }

      - name: Build MSI installer
        shell: pwsh
        run: |
          .\scripts\build_msi.ps1

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: gqfilter_windows
          path: dist/gqfilter_windows.zip

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gqfilter_windows_msi
          path: dist/gqfilter.msi

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gqfilter_windows.zip
            dist/gqfilter.msi